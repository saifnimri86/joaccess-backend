name: JOAccess Backend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Job 1: Test + Security scan ──────────────────────────────────────────
  build-test-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend   # all commands run inside the backend/ folder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests (Pytest)
        # Dummy env vars so Flask config doesn't blow up during tests
        env:
          SECRET_KEY: ci-test-secret
          JWT_SECRET_KEY: ci-test-jwt-secret
          DATABASE_URL: sqlite:///test.db
          CV_SERVICE_URL: http://localhost:9999
          CV_SHARED_SECRET: ci-test-cv-secret
          OPENROUTER_API_KEY: ci-test-key
          ASSISTANT_API_KEY: ci-test-key
          SUPABASE_URL: http://localhost:9999
          SUPABASE_SERVICE_KEY: ci-test-key
        run: pytest -v --disable-warnings

      - name: Run Security Scan (Bandit)
        # B104: hardcoded bind-all (0.0.0.0) — fine for Flask/gunicorn
        # B105: hardcoded password string — flags our "dev-only-change-me" defaults
        run: bandit -r . -x ./test_app.py -s B104,B105

  # ── Job 2: Build + push Docker image ─────────────────────────────────────
  docker-deploy:
    runs-on: ubuntu-latest
    needs: build-test-scan          # only runs if job 1 passes
    if: github.event_name == 'push' # skip on pull requests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        # Builds from the backend/ subfolder where the Dockerfile lives
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/joaccess-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/joaccess-backend:${{ github.sha }} \
            ./backend

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/joaccess-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/joaccess-backend:${{ github.sha }}
